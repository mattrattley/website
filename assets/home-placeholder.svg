<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200" role="img" aria-labelledby="title desc">
  <title id="title">Placeholder portrait image</title>
  <desc id="desc">Simple gradient block placeholder for home hero image.</desc>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8a4a54"/>
      <stop offset="100%" stop-color="#d7c5c8"/>
    </linearGradient>
  </defs>
  <rect width="800" height="1200" fill="url(#g)"/>
  <circle cx="400" cy="350" r="140" fill="#f2e6e8" opacity="0.9"/>
  <rect x="200" y="520" width="400" height="500" rx="120" fill="#f2e6e8" opacity="0.85"/>
  <text x="50%" y="1120" text-anchor="middle" font-family="Arial, sans-serif" font-size="38" fill="#402026">Replace with your chosen photo</text>
</svg>
